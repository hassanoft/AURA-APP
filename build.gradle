// build.gradle racine — AURA Social Network
// Compatible CodeAssist Android + Android Studio

buildscript {
    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.4'
        // Pas de Kotlin plugin — projet 100% Java
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://jitpack.io' }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
